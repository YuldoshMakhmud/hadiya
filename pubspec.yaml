name: hadiya
description: "Hadiya - Korean Cosmetics & Vitamins Shop"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.3
  provider: ^6.1.2
  firebase_core: ^3.15.2
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.4.10
  flutter_dotenv: ^5.2.1
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
    background_color: "#1A5C52"
    theme_color: "#1A5C52"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
